<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Best Day to Ride Planner</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="layout">
    <section class="hero">
      <p class="eyebrow">British Columbia Ski Planner</p>
      <h1>Best Day to Ride</h1>
      <p class="subtitle">Personalized resort recommendations with transparent fit scoring.</p>
    </section>

    <section id="tab-planner" class="tab-screen active">
      <section class="panel">
        <h2>Planner</h2>
        <form id="plannerForm" class="form-grid">
          <label>Profile Name <input id="profileName" type="text" placeholder="Weekend Powder Plan"></label>
          <label>Skill Level
            <select id="skillLevel">
              <option value="beginner">Beginner</option>
              <option value="intermediate" selected>Intermediate</option>
              <option value="expert">Expert</option>
            </select>
          </label>
          <label>Blue % <input id="blueMix" type="number" value="35" min="0" max="100"></label>
          <label>Red % <input id="redMix" type="number" value="45" min="0" max="100"></label>
          <label>Black % <input id="blackMix" type="number" value="20" min="0" max="100"></label>
          <label>Max Drive Hours <input id="maxDrive" type="number" value="5" step="0.5" min="0.5"></label>
          <label>Budget (CAD) <input id="budget" type="number" value="260" step="5" min="50"></label>
          <label>Latitude <input id="userLat" type="number" step="0.0001" value="49.2827"></label>
          <label>Longitude <input id="userLon" type="number" step="0.0001" value="-123.1207"></label>
          <label>Powder Preference (0-10) <input id="powderPref" type="number" value="7" min="0" max="10"></label>
          <label>Preferred Temp C <input id="tempPref" type="number" value="-5" step="1"></label>
          <label>Wind Tolerance km/h <input id="windTol" type="number" value="30" min="5" max="80"></label>
          <label>Crowd Tolerance
            <select id="crowdTol">
              <option value="low">Low (avoid crowds)</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High (crowds acceptable)</option>
            </select>
          </label>
        </form>
        <div class="actions">
          <button id="runBtn">Find My Best Day</button>
          <button id="saveProfileBtn" class="secondary">Save Profile</button>
          <button id="loadProfilesBtn" class="secondary">Load Profiles</button>
        </div>
        <p id="statusText" class="status"></p>
      </section>
    </section>

    <section id="tab-results" class="tab-screen">
      <section class="panel">
        <h2>Ranked Recommendations</h2>
        <div id="resultsWrap" class="cards"></div>
      </section>
    </section>

    <section id="tab-compare" class="tab-screen">
      <section class="panel">
        <h2>Top 3 Compare</h2>
        <div id="compareWrap" class="table-wrap"></div>
      </section>
    </section>

    <section id="tab-favorites" class="tab-screen">
      <section class="panel">
        <h2>Favorites / Watchlist</h2>
        <div class="actions">
          <button id="loadFavsBtn" class="secondary">Load Favorites</button>
        </div>
        <div id="favoritesWrap"></div>
      </section>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="planner">Planner</button>
    <button class="tab-btn" data-tab="results">Results</button>
    <button class="tab-btn" data-tab="compare">Compare</button>
    <button class="tab-btn" data-tab="favorites">Favorites</button>
  </nav>

  <script>
    const statusText = document.getElementById("statusText");
    const resultsWrap = document.getElementById("resultsWrap");
    const compareWrap = document.getElementById("compareWrap");
    const favoritesWrap = document.getElementById("favoritesWrap");
    const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
    const tabScreens = {
      planner: document.getElementById("tab-planner"),
      results: document.getElementById("tab-results"),
      compare: document.getElementById("tab-compare"),
      favorites: document.getElementById("tab-favorites"),
    };

    function setTab(tab) {
      for (const [key, screen] of Object.entries(tabScreens)) {
        screen.classList.toggle("active", key === tab);
      }
      for (const btn of tabButtons) {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      }
    }

    tabButtons.forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));

    function plannerPayload() {
      return {
        skill_level: document.getElementById("skillLevel").value,
        terrain_mix: {
          blue: Number(document.getElementById("blueMix").value),
          red: Number(document.getElementById("redMix").value),
          black: Number(document.getElementById("blackMix").value),
        },
        max_drive_hours: Number(document.getElementById("maxDrive").value),
        budget_cad: Number(document.getElementById("budget").value),
        user_lat: Number(document.getElementById("userLat").value),
        user_lon: Number(document.getElementById("userLon").value),
        powder_preference: Number(document.getElementById("powderPref").value),
        preferred_temp_c: Number(document.getElementById("tempPref").value),
        wind_tolerance_kmh: Number(document.getElementById("windTol").value),
        crowd_tolerance: document.getElementById("crowdTol").value
      };
    }

    function renderCompare(rows) {
      if (!rows || !rows.length) {
        compareWrap.innerHTML = "<p>No comparison available yet.</p>";
        return;
      }
      compareWrap.innerHTML = `
        <table>
          <thead>
            <tr><th>Resort</th><th>Fit</th><th>Slope km</th><th>Lifts</th><th>Trip Cost</th><th>Drive Hrs</th><th>Best Window</th></tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.name}</td>
                <td>${r.fit_score}</td>
                <td>${r.total_slope_km ?? "N/A"}</td>
                <td>${r.lifts_count ?? "N/A"}</td>
                <td>$${r.total_trip_cad}</td>
                <td>${r.travel_hours ?? "N/A"}</td>
                <td>${r.best_day_window}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;
    }

    function scoreBar(value) {
      const pct = Math.max(0, Math.min(100, Math.round(value * 100)));
      return `<div class="bar"><span style="width:${pct}%"></span></div><small>${pct}%</small>`;
    }

    function renderResults(rows) {
      if (!rows || !rows.length) {
        resultsWrap.innerHTML = "<p>No resorts match these constraints.</p>";
        return;
      }
      resultsWrap.innerHTML = rows.map(row => `
        <article class="card">
          <div class="card-top">
            <h3>#${row.rank} ${row.resort.name}</h3>
            <strong>${row.fit_score} Fit</strong>
          </div>
          <p>${row.why_top}</p>
          <p><b>Best day/time:</b> ${row.best_day_window}</p>
          <p><b>Est. cost:</b> Lift $${row.estimated_cost.day_pass_cad} + Travel $${row.estimated_cost.travel_cad} = <b>$${row.estimated_cost.total_cad}</b></p>
          <p><b>Travel:</b> ${row.estimated_travel.drive_hours ?? "N/A"} hr, ${row.estimated_travel.distance_km ?? "N/A"} km</p>
          <p><b>Terrain:</b> ${row.resort.total_slope_km ?? "N/A"} km total (${row.resort.blue_slope_km ?? "N/A"} blue / ${row.resort.red_slope_km ?? "N/A"} red / ${row.resort.black_slope_km ?? "N/A"} black)</p>
          <div class="score-grid">
            <div>Terrain ${scoreBar(row.score_breakdown.terrain)}</div>
            <div>Skill ${scoreBar(row.score_breakdown.skill)}</div>
            <div>Budget ${scoreBar(row.score_breakdown.budget)}</div>
            <div>Drive ${scoreBar(row.score_breakdown.drive)}</div>
            <div>Crowd ${scoreBar(row.score_breakdown.crowd)}</div>
            <div>Weather ${scoreBar(row.score_breakdown.weather)}</div>
          </div>
          <div class="actions">
            <button class="secondary" onclick="saveFavorite('${row.resort.id}')">Add to Favorites</button>
            <a class="link-btn" href="${row.resort.source_url}" target="_blank" rel="noreferrer">Source</a>
          </div>
        </article>
      `).join("");
    }

    async function runPlanner() {
      statusText.textContent = "Running planner...";
      resultsWrap.innerHTML = "";
      compareWrap.innerHTML = "";
      try {
        const res = await fetch("/api/planner/recommend", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(plannerPayload())
        });
        if (!res.ok) throw new Error("Planner request failed");
        const data = await res.json();
        renderCompare(data.compare_top_3);
        renderResults(data.results);
        statusText.textContent = data.alert ? `Done. ${data.alert}` : "Done.";
        setTab("results");
      } catch (err) {
        console.error(err);
        statusText.textContent = "Planner failed. Check server logs.";
      }
    }

    async function saveProfile() {
      const name = document.getElementById("profileName").value.trim();
      if (!name) {
        statusText.textContent = "Enter profile name first.";
        return;
      }
      const res = await fetch("/api/planner/profiles", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, preferences: plannerPayload()})
      });
      statusText.textContent = res.ok ? `Profile "${name}" saved.` : "Failed to save profile.";
    }

    async function loadProfiles() {
      const res = await fetch("/api/planner/profiles");
      if (!res.ok) {
        statusText.textContent = "Failed to load profiles.";
        return;
      }
      const profiles = await res.json();
      if (!profiles.length) {
        statusText.textContent = "No saved profiles yet.";
        return;
      }
      statusText.textContent = `Saved profiles: ${profiles.map(p => p.name).join(", ")}`;
    }

    async function saveFavorite(resortId) {
      const res = await fetch("/api/planner/favorites", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({resort_id: resortId})
      });
      statusText.textContent = res.ok ? "Added to favorites." : "Failed to add favorite.";
    }
    window.saveFavorite = saveFavorite;

    async function loadFavorites() {
      const res = await fetch("/api/planner/favorites");
      if (!res.ok) {
        favoritesWrap.innerHTML = "<p>Failed to load favorites.</p>";
        return;
      }
      const rows = await res.json();
      favoritesWrap.innerHTML = rows.length
        ? `<ul>${rows.map(r => `<li>${r.resort_id}${r.note ? " - " + r.note : ""}</li>`).join("")}</ul>`
        : "<p>No favorites yet.</p>";
    }

    document.getElementById("runBtn").addEventListener("click", runPlanner);
    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
    document.getElementById("loadProfilesBtn").addEventListener("click", loadProfiles);
    document.getElementById("loadFavsBtn").addEventListener("click", () => {
      loadFavorites();
      setTab("favorites");
    });
  </script>
</body>
</html>
